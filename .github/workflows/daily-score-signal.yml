name: Daily Score Signal

on:
  schedule:
    # Runs at 10pm UTC (5pm EST) Monday-Friday
    # - Uses data from prior evening's nightly ingest
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  daily-score-signal:
    name: Python daily score and signal
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync dependencies
        working-directory: engine-py
        run: uv sync
      - name: Run daily score and signal
        working-directory: engine-py
        run: uv run python -m artisan.jobs.daily_score_signal
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          ALPACA_BASE_URL: ${{ secrets.ALPACA_BASE_URL }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          STRATEGY_ID: ${{ secrets.STRATEGY_ID }}
          ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}
          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
          LOG_LEVEL: INFO
