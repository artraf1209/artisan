app = "artisan-bot"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"

[[services]]
  internal_port = 3001
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[mounts]
  # No persistent storage needed for stateless bot

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
